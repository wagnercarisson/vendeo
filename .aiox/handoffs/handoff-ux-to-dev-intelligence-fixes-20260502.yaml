## FIX 3: Autosave em Navegação 🔴 P0 - CRÍTICO

### Problema Atual:
- Autosave só escuta `activeTab` no useEffect (linha 323-343)
- Não salva quando usuário clica em link da sidebar (Campanhas, Planos, etc.)
- Não salva quando usuário pressiona voltar no browser
- Não salva quando usuário fecha aba ou atualiza página (F5)
- **RESULTADO:** Perda de dados do formulário → perda de confiança do lojista

### Localização:
**Arquivo:** `app/dashboard/store/intelligence/hooks/useIntelligenceForm.ts`  
**Linhas:** 323-343 (useEffect de autosave)

### Mudanças Necessárias:

#### 3.1 - Adicionar beforeunload handler (salva ao fechar/atualizar)

**Adicionar APÓS o useEffect atual de autosave (linha ~343):**

```tsx
// Save on page unload (close tab, refresh, navigate away)
useEffect(() => {
  const handleBeforeUnload = (e: BeforeUnloadEvent) => {
    const currentSignature = signatureRef.current;
    const isDirty = currentSignature !== lastSavedSignatureRef.current;
    const emptyAndNeverSaved =
      filledFieldsRef.current === 0 && lastSavedSignatureRef.current === createSignature({});

    if (isDirty && !emptyAndNeverSaved && storeId) {
      // Try to save (browser may block async operations here)
      void saveChanges(contextRef.current, signatureRef.current);

      // Warn user about unsaved changes
      e.preventDefault();
      e.returnValue = "Você tem alterações não salvas. Tem certeza que deseja sair?";
      return e.returnValue;
    }
  };

  window.addEventListener("beforeunload", handleBeforeUnload);

  return () => {
    window.removeEventListener("beforeunload", handleBeforeUnload);
  };
}, [storeId]);
```

#### 3.2 - Adicionar route change handler (salva ao navegar via sidebar/links)

**Adicionar APÓS o useEffect de beforeunload:**

```tsx
// Save on route change (sidebar navigation, back button)
useEffect(() => {
  const handleVisibilityChange = () => {
    if (document.visibilityState === "hidden") {
      const currentSignature = signatureRef.current;
      const isDirty = currentSignature !== lastSavedSignatureRef.current;
      const emptyAndNeverSaved =
        filledFieldsRef.current === 0 && lastSavedSignatureRef.current === createSignature({});

      if (isDirty && !emptyAndNeverSaved && storeId) {
        // Use sendBeacon for reliable save on page unload
        const payload = {
          store_id: storeId,
          context: contextRef.current,
        };

        // Try fetch first (more reliable), fallback to sendBeacon
        fetch("/api/store/intelligence", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true, // Keep request alive after page unload
        }).catch(() => {
          // Fallback to sendBeacon if fetch fails
          navigator.sendBeacon(
            "/api/store/intelligence",
            JSON.stringify(payload)
          );
        });
      }
    }
  };

  document.addEventListener("visibilitychange", handleVisibilityChange);

  return () => {
    document.removeEventListener("visibilitychange", handleVisibilityChange);
  };
}, [storeId]);
```

#### 3.3 - Adicionar cleanup no unmount do componente

**Adicionar APÓS os useEffects acima:**

```tsx
// Save on component unmount (navigation via Next.js router)
useEffect(() => {
  return () => {
    const currentSignature = signatureRef.current;
    const isDirty = currentSignature !== lastSavedSignatureRef.current;
    const emptyAndNeverSaved =
      filledFieldsRef.current === 0 && lastSavedSignatureRef.current === createSignature({});

    if (isDirty && !emptyAndNeverSaved && storeId) {
      // Synchronous save on unmount (blocking)
      const payload = {
        store_id: storeId,
        context: contextRef.current,
      };

      navigator.sendBeacon(
        "/api/store/intelligence",
        JSON.stringify(payload)
      );
    }
  };
}, [storeId]);
```

**IMPORTANTE:** `navigator.sendBeacon` requer que o endpoint `/api/store/intelligence` aceite `text/plain` content-type, pois sendBeacon não suporta custom headers. Se necessário, ajustar o endpoint para detectar sendBeacon requests.

### Alternativa (se sendBeacon não funcionar):

Se o endpoint não puder ser adaptado, usar apenas `visibilitychange` + `beforeunload` com fetch + keepalive:

```tsx
// Unified save on visibility change + unmount
useEffect(() => {
  const saveOnExit = () => {
    const currentSignature = signatureRef.current;
    const isDirty = currentSignature !== lastSavedSignatureRef.current;
    const emptyAndNeverSaved =
      filledFieldsRef.current === 0 && lastSavedSignatureRef.current === createSignature({});

    if (isDirty && !emptyAndNeverSaved && storeId) {
      fetch("/api/store/intelligence", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          store_id: storeId,
          context: contextRef.current,
        }),
        keepalive: true,
      }).catch(() => {
        console.error("Failed to save intelligence on exit");
      });
    }
  };

  const handleVisibilityChange = () => {
    if (document.visibilityState === "hidden") {
      saveOnExit();
    }
  };

  document.addEventListener("visibilitychange", handleVisibilityChange);
  window.addEventListener("beforeunload", saveOnExit);

  return () => {
    saveOnExit(); // Save on unmount
    document.removeEventListener("visibilitychange", handleVisibilityChange);
    window.removeEventListener("beforeunload", saveOnExit);
  };
}, [storeId]);
```

**Resultado esperado:**
- ✅ Salva ao trocar de tab (comportamento existente mantido)
- ✅ Salva ao clicar em link da sidebar
- ✅ Salva ao pressionar voltar no browser
- ✅ Salva ao fechar aba (com aviso se houver mudanças)
- ✅ Salva ao atualizar página (F5)
- ✅ Aviso ao usuário se tentar sair com mudanças pendentes

