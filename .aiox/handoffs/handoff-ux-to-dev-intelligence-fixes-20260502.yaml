## ⚠️ WARNINGS

- **Fix 3:** `navigator.sendBeacon` envia como `text/plain`. Se endpoint `/api/store/intelligence` exigir `application/json`, usar alternativa com `fetch` + `keepalive` apenas.
- **Fix 1:** Enter key no input pode conflitar com form submission se houver `<form>` wrapper. Verificar `event.preventDefault()` se necessário.
- **Fix 2:** Placeholders dinâmicos aumentam bundle size minimamente. Considerar i18n se houver multilanguage no roadmap.

