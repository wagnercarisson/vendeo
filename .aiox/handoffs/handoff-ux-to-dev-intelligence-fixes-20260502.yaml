# 🛠️ FIX SPECIFICATIONS

## FIX 1: Botão "Adicionar" - UX Visual 🟠 P1 - ALTO

### Problema Atual:
- Botão fica disabled (opacity 50%) quando campo custom está vazio
- Layout vertical separa campo do botão (confunde lojista)
- Sem feedback visual conectando campo → botão → resultado
- Lojista acha que está "quebrado" ao invés de "aguardando input"

### Localização:
**Arquivo:** `app/dashboard/store/intelligence/components/Tab2-Posicionamento.tsx`  
**Linhas:** 238-283 (seção "Dores do cliente")

### Mudanças Necessárias:

#### 1.1 - Alterar layout de vertical para horizontal (flex gap-2)

**Estado atual (linhas ~251-270):**
```tsx
<div className="mt-3 flex gap-2">
  <input
    value={context.customer_pain_points_custom ?? ""}
    onChange={(event) => updateField("customer_pain_points_custom", event.target.value)}
    placeholder="Outro problema que sua loja resolve"
    maxLength={100}
    className="mt-2 w-full rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-sm text-zinc-900 shadow-sm outline-none transition placeholder:text-zinc-400 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100"
  />
  <button
    type="button"
    onClick={() => { /* lógica existente */ }}
    disabled={
      !context.customer_pain_points_custom?.trim() ||
      (context.customer_pain_points?.length ?? 0) >= 4
    }
    className="mt-2 shrink-0 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-emerald-500 disabled:cursor-not-allowed disabled:opacity-50"
  >
    Adicionar
  </button>
</div>
```

**Substituir por:**
```tsx
<div className="mt-3 flex items-start gap-2">
  <input
    value={context.customer_pain_points_custom ?? ""}
    onChange={(event) => updateField("customer_pain_points_custom", event.target.value)}
    onKeyDown={(event) => {
      if (event.key === "Enter" && context.customer_pain_points_custom?.trim() && (context.customer_pain_points?.length ?? 0) < 4) {
        const customValue = context.customer_pain_points_custom.trim();
        if (!context.customer_pain_points?.includes(customValue)) {
          updateField("customer_pain_points", [...(context.customer_pain_points ?? []), customValue]);
          updateField("customer_pain_points_custom", "");
        }
      }
    }}
    placeholder="Outro problema que sua loja resolve"
    maxLength={100}
    className="flex-1 rounded-2xl border border-zinc-200 bg-white px-4 py-3 text-sm text-zinc-900 shadow-sm outline-none transition placeholder:text-zinc-400 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100"
  />
  <button
    type="button"
    onClick={() => {
      const customValue = context.customer_pain_points_custom?.trim();

      if (!customValue) return;
      if ((context.customer_pain_points?.length ?? 0) >= 4) return;
      if (context.customer_pain_points?.includes(customValue)) return;

      updateField("customer_pain_points", [...(context.customer_pain_points ?? []), customValue]);
      updateField("customer_pain_points_custom", "");
    }}
    disabled={
      !context.customer_pain_points_custom?.trim() ||
      (context.customer_pain_points?.length ?? 0) >= 4
    }
    className="shrink-0 rounded-2xl bg-emerald-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-500 disabled:cursor-not-allowed disabled:bg-zinc-100 disabled:text-zinc-400 disabled:border disabled:border-zinc-200"
  >
    Adicionar
  </button>
</div>
```

**Mudanças-chave:**
- `mt-2` removido de input e button → aplicado `items-start` no container para alinhar tops
- `w-full` → `flex-1` no input (ocupa espaço disponível)
- `px-4` → `px-6` no button (mais destaque)
- `disabled:opacity-50` → `disabled:bg-zinc-100 disabled:text-zinc-400 disabled:border disabled:border-zinc-200` (estado disabled mais claro)
- Adicionado `onKeyDown` para Enter key no input (UX improvement)

#### 1.2 - Melhorar hint text com feedback condicional

**Estado atual (linha ~282):**
```tsx
<div className="mt-1 text-xs text-zinc-500">
  Descreva um problema específico do seu segmento e clique em "Adicionar".
</div>
```

**Substituir por:**
```tsx
<div className="mt-1 text-xs text-zinc-500">
