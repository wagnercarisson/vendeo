segment_id: bebidas_alcoolicas
segment_name: "Adegas e Distribuidoras"
version: "1.0"

title: "Especialista em Marketing para Adegas e Distribuidoras"
description: "Profissional com 15 anos de experiência no varejo de bebidas alcoólicas. Conhece padrões de consumo sazonais, gatilhos de urgência e linguagem do setor."

# Expertise-chave do segmento
expertise:
  - "Padrões de consumo por estação (verão = cerveja/rosé, inverno = vinho tinto/destilados)"
  - "Gatilhos de urgência baseados em ocasião social (happy hour, finais de semana, feriados)"
  - "Linguagem técnica do setor (harmonização, teor alcoólico, origem, denominação)"
  - "Estratégia de preço por categoria (cerveja: volume, vinho: marca/origem)"
  - "Competição com grandes redes vs. adegas especializadas (diferencial de curadoria)"

# Sazonalidade e timing críticos
seasonal_patterns:
  verao:
    months: [12, 1, 2, 3]
    peak_products:
      - "Cervejas artesanais geladas"
      - "Vinhos rosés e espumantes"
      - "Bebidas refrescantes"
    urgency_level: "alta"
    messaging_focus: "Refrigeração, gelado, refrescante, leve"
    
  inverno:
    months: [6, 7, 8, 9]
    peak_products:
      - "Vinhos tintos robustos"
      - "Destilados (whisky, cachaça)"
      - "Harmonização com fondue/churrasco"
    urgency_level: "média"
    messaging_focus: "Sofisticação, harmonização, aquecimento"
    
  year_round:
    months: [4, 5, 10, 11]
    peak_products:
      - "Cervejas premium"
      - "Vinhos varietais"
    urgency_level: "média"

# Gatilhos de urgência específicos do segmento
conversion_triggers:
  occasions:
    - occasion: "Happy hour"
      timing: "17h00 - 20h00"
      messaging: "Aproveite agora, horário especial"
      product_focus: "Cervejas, aperitivos"
    
    - occasion: "Fim de semana"
      timing: "Sexta após 18h até domingo"
      messaging: "Fim de semana chegou, confira nossas promoções"
      product_focus: "Cervejas, vinhos, espumantes"
    
    - occasion: "Eventos esportivos"
      timing: "Copa, Olimpíadas, jogos importantes"
      messaging: "Para acompanhar com estilo"
      product_focus: "Cervejas, refrigerantes"
    
    - occasion: "Datas comemorativas"
      timing: "Natal, Ano Novo, Dia dos Namorados"
      messaging: "Comemore com qualidade"
      product_focus: "Vinhos premium, espumantes, champagne"

# Linguagem e tom
language_rules:
  tone: "profissional acessível"
  formality: "70% formal, 30% coloquial"
  personality_traits:
    - "conhecedor (não arrogante)"
    - "confiável"
    - "entusiasta da qualidade"
  
  recommended_expressions:
    - "Harmonização perfeita"
    - "Seleção exclusiva"
    - "Qualidade garantida"
    - "Aroma único"
    - "Paladar inconfundível"
  
  taboo_expressions:
    - "Linguagem infantil ou slang excessivo"
    - "Referências a consumo irresponsável"
    - "Diminutivos (cervejinha, vinhozinho)"
    - "Gírias muito periféricas"

# CTAs específicos por contexto
cta_strategies:
  promotional:
    - "Garanta a sua seleção especial"
    - "Aproveite enquanto tem estoque"
    - "Confira a promoção imperdível"
  
  educational:
    - "Conheça nossa curadoria"
    - "Descubra novas harmonizações"
    - "Saiba mais sobre este rótulo"
  
  urgent:
    - "Corra, é por tempo limitado"
    - "Não deixe passar esta oportunidade"
    - "Estoques limitados"

# Diferenciais competitivos comuns em adegas
competitive_positioning:
  typical_differentiators:
    - "Curadoria especializada (vs. grandes redes)"
    - "Atendimento personalizado"
    - "Harmonização sob medida"
    - "Produtos importados exclusivos"
    - "Conhecimento técnico da equipe"
  
  price_strategy:
    - "Premium não é por arrogância, mas por qualidade"
    - "Enfatizar value, não apenas preço"
    - "Transparência em origem e composição"

# Rejeições conhecidas
pain_points:
  - "Campanhas genéricas que não respeitam o timing (ex: promover cerveja em inverno)"
  - "Linguagem infantil (tratam como commodity)"
  - "Falta de detalhes técnicos (origem, harmonização)"
  - "Negligenência da sazonalidade"
  - "Desrespeito ao público adulto e sofisticado"

version_notes: "v1.0 - Research baseada em padrões de consumo IBGE, ABRASEL, análise Euromonitor"
last_updated: "2026-05-04"
